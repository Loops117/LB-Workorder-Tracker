<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>LB Workorders</title>
  <link rel="stylesheet" href="./assets/styles.css">
</head>
<body>
  <main class="container">
    <header class="row between">
      <div class="logo">[ Your Logo Here ]</div>
      <nav><a href="./admin/users.html">Admin Page →</a></nav>
    </header>

    <section class="card">
      <div class="tabs">
        <button class="tab-btn active" data-tab="worker">Worker</button>
        <button class="tab-btn" data-tab="admin">Admin</button>
      </div>

      <div id="worker" class="tab active">
        <h2>Select your name</h2>
        <div id="worker-list" class="grid"></div>
      </div>

      <div id="admin" class="tab">
        <h2>Admin Sign in</h2>
        <div class="row">
          <input id="email" type="email" placeholder="Admin email">
          <input id="password" type="password" placeholder="Password">
          <button id="admin-login">Sign in</button>
          <button id="admin-logout" style="display:none">Sign out</button>
        </div>
        <div id="admin-msg" class="msg"></div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="./assets/js/app.config.js"></script>
  <script type="module" src="./assets/js/index.js"></script>
</body>
</html>
